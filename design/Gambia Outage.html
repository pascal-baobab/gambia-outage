<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Gambia Outage</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #E7EBEF; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
  * { box-sizing: border-box; }
  #root { height: 100%; }
  button { font-family: inherit; }
  ::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }
  @keyframes gptPulse { 0% { transform: scale(1); opacity: 0.7; } 70% { transform: scale(2.6); opacity: 0; } 100% { opacity: 0; } }
  @keyframes gptShimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
  @keyframes gptSheetIn { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes gptToastIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes gptFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes gptPop { 0% { transform: scale(0.4); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes gmzPulse { 0% { transform: scale(0.45); opacity: 0.55; } 70% { transform: scale(1.7); opacity: 0; } 100% { opacity: 0; } }
  .gmz-pulse { animation: gmzPulse 2.2s ease-out infinite; }
  /* Leaflet markers */
  .gmz-pin-wrap { background: none; border: none; }
  .gmz-pin { position: relative; width: 30px; height: 40px; filter: drop-shadow(0 3px 4px rgba(15,23,34,0.32)); }
  .gmz-pin .gmz-ring { display: none; }
  .gmz-pin.is-out .gmz-ring { display: block; position: absolute; left: 50%; bottom: 2px; width: 18px; height: 18px; margin-left: -9px; border-radius: 999px; background: var(--c); opacity: 0.5; animation: gmzPulse 2.2s ease-out infinite; transform-origin: center; }
  .leaflet-container { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #E7EEF1; }
  .leaflet-tooltip.gmz-label { background: rgba(15,23,34,0.86); color: #fff; border: none; box-shadow: 0 2px 6px rgba(0,0,0,0.25); font-size: 11px; font-weight: 800; letter-spacing: 0.2px; padding: 2px 7px; border-radius: 7px; }
  .leaflet-tooltip.gmz-label::before { border-top-color: rgba(15,23,34,0.86); }
  .leaflet-tooltip.gmz-tt { font-size: 11.5px; font-weight: 600; border-radius: 7px; padding: 3px 8px; }
  .gmz-hide-labels .leaflet-tooltip.gmz-label { display: none !important; }
  .leaflet-control-zoom a { border-radius: 8px !important; color: #11161C !important; font-weight: 600; }
  .leaflet-control-attribution { font-size: 9px; background: rgba(255,255,255,0.7); }
  @keyframes goLogoSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes goWave { 0%, 100% { transform: scaleY(0.35); } 50% { transform: scaleY(1); } }
  @keyframes goTrackLoop { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; animation-iteration-count: 1 !important; transition-duration: 0.001ms !important; }
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
